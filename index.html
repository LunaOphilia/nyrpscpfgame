      },
      {
        id: 17,
        text: "17. 明面上的提纯大战还是终于拉开了序幕，看到gslm以及两方wf的互撕争吵，你最倾向于",
        options: [
          { text: "A. 本宫的头好痛呀，拜拜就拜拜，下一个更乖", 提纯底子: 0, 乐子人属性: 3, 看破程度: 2, flag: 'choice17_A' },
          { text: "B. Ta为何纵容他的粉丝伤害ta呀，原来利益面前真爱不过如此", 提纯底子: 5, 乐子人属性: 0, 看破程度: 0, flag: 'choice17_B' },
          { text: "C. 关我什么事呢，一心只想嗑cp", 提纯底子: 0, 乐子人属性: 0, 看破程度: 3, flag: 'choice17_C' },
          { text: "D. 你俩说句话呀，发卖还是挽留别让我猜", 提纯底子: 0, 乐子人属性: 0, 看破程度: 1, flag: 'choice17_D' }

    // 结局文本
    const endings = {
      END1: {
        title: "END 1 · 四处皆空",

        text: `你收拾了自己的心情，把所有双人周边挂到海鲜市场或者压箱底了。那些年让你心动的瞬间，你依然愿意相信它们在当时是真实的。只是后来，一切都变成了生意。
你作出了永世不嗑rps的承诺，并立下家训。
但偶尔，真的只是偶尔，你还是会想起那个在嗑到深夜对着屏幕傻笑的自己。

      },
      END2: {
        title: "END 2 · 陷入循环",
        tagline: "我们必须想象自己是幸福的。",
        text: `你脱粉回踩的微博还挂在首页，但手指已经诚实地在搜索新的CP名。

"这次真的不一样。"你对自己说。
上一次你也是这么说的。上上次也是。
但没关系，幸福本身就是一种想象。而你很擅长想象。`
      },
      END3: {
        title: "END 3 · 不死不休",
        tagline: "我会像鬼一样缠着你们，永远……",
        text: `爱和恨是同一种东西的两种颜色。你选择了最浓烈的那种。
被叫蟑螂也没关系，炸上天也没关系。

他们说你是黑粉。你不这么认为。
你只是不能接受，那个曾经让你那么快乐的幻象，是由这两个活生生的人亲手打碎的。

永远，永远。`
      },
      END4: {
        title: "END 4 · 谁是赢家？",
        tagline: "过去的你是笑柄，是投诚书，是虐粉素材。你成为自己过去最恨的人。",
        text: `你翻看删除着自己的微博，上面写着"CP粉是最懂真心的"。你笑了，然后删掉了那条。

你不知道自己在怕什么。
也不知道这份缺失的感情，还能在别处找到吗。`
      },
      END5: {
        title: "END 5 · 永不相见",
        tagline: "你只能看着他们渐行渐远。那些同行过的路，是真实的吗？",

没有交集。没有提及。没有暗示。
你偶尔会想起当初他们在舞台上并肩的样子，但那画面已经模糊了，像一张过曝的老照片。
你问自己，那些同行过的路是真实的吗？
你没有答案。
不过从来如此。`
      },
      END6: {
        title: "END 6 · 百毒不侵",
        tagline: "你偶尔会想自己有什么错呢。大家都和我一样就好了。",
        text: `提纯大战的硝烟从未散去，但你早已学会在炮火中喝茶。
唯粉说你是歪屁股，资本说你是韭菜，路人说你是疯子。
你听着，然后继续打开珍藏双人物料。
你偶尔会想，自己有什么错呢。你没有伤害任何人，你只是希望两个人能在一起。
大家都和你一样就好了。世界会简单很多。
也许最终你依然得不到想要的结果——
但那又怎样。
你选择了自己的路。从头到尾，都是你自己选的。或许是吧。`
      }
    };

    // 状态变量
    let currentQuestionIndex = 0;
    let attributes = { 提纯底子: 0, 乐子人属性: 0, 看破程度: 0 };
    let flag14_BorE = false;
    let flag16_E = false;
    let flag17_A = false;
    let flag17_B = false;
    let flag17_C = false;
    let flag17_D = false;
    let agreed = false;

    const app = document.getElementById('app');

    function resetGame() {
      currentQuestionIndex = 0;
      attributes = { 提纯底子: 0, 乐子人属性: 0, 看破程度: 0 };
      flag14_BorE = false;
      flag16_E = false;
      flag17_A = false;
      flag17_B = false;
      flag17_C = false;
      flag17_D = false;
      renderQuestion();
    }

    function applyOption(option) {
      attributes.提纯底子 += option.提纯底子 || 0;
      attributes.乐子人属性 += option.乐子人属性 || 0;
      attributes.看破程度 += option.看破程度 || 0;
      if (option.flag === 'choice14_BorE') flag14_BorE = true;
      if (option.flag === 'choice16_E') flag16_E = true;
      if (option.flag === 'choice17_A') flag17_A = true;
      if (option.flag === 'choice17_B') flag17_B = true;
      if (option.flag === 'choice17_C') flag17_C = true;
      if (option.flag === 'choice17_D') flag17_D = true;
    }

    function determineEnding() {
      const t = attributes.提纯底子;
      const l = attributes.乐子人属性;
      let k = attributes.看破程度;

      // 隐藏分水岭：16题选E，END6看破门槛降低2
      if (flag16_E && flag17_C) {
        k += 2; // 内部调整，不影响显示
      }

      // 优先级判定
      // 1. END3 极端转唯+回踩组合
      if (flag14_BorE && flag17_B) return 'END3';
      // 2. END4 转唯标记
      if (t >= 20 && flag14_BorE) return 'END4';
      // 3. END6 百毒不侵
      if (flag17_C && (k >= 18 || (l >= 12 && k >= 15))) return 'END6';
      // 4. END5 体面告别
      if ((flag17_D && k >= 14 && t < 16) || (flag17_A && k >= 10)) return 'END5';
      // 5. END3 纯数值
      if (t >= 22 && l <= 2) return 'END3';
      // 6. END4 高提纯保底
      if (t >= 24) return 'END4';
      // 7. END1
      if (k >= 16 && t < 10) return 'END1';
      // 8. END2
      if (l >= 15 && k < 10) return 'END2';
      // 兜底
      if (t >= 18) return 'END4';
      if (l >= 12) return 'END2';
      return 'END5';
    }

    function renderEnding(endingKey) {
      const e = endings[endingKey];
      const html = `
        <div class="ending-card">
          <div class="ending-title">${e.title}</div>
          <div class="ending-tagline">"${e.tagline}"</div>
          <div class="ending-text">${e.text.replace(/\n/g, '<br>')}</div>
          <div class="attribute-box">
            <div class="attr"><span class="attr-value">${attributes.提纯底子.toFixed(1)}</span><span class="attr-label">提纯底子</span></div>
            <div class="attr"><span class="attr-value">${attributes.乐子人属性.toFixed(1)}</span><span class="attr-label">乐子人</span></div>
            <div class="attr"><span class="attr-value">${attributes.看破程度.toFixed(1)}</span><span class="attr-label">看破程度</span></div>
          </div>
          <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
      `;
      app.innerHTML = html;
      document.getElementById('restartBtn').addEventListener('click', resetGame);
    }

    function renderDisclaimer() {
      const html = `
        <div class="disclaimer-card">
          <div class="disclaimer-icon">📋</div>
          <div class="disclaimer-title">进入游戏前，请先阅读</div>
          <div class="disclaimer-box">
            <p><span class="bold">叠甲声明</span></p>
            <p>本模拟器<span class="bold">不影射任何CP粉群体</span>，仅为作者惨痛的个人经历摹写。</p>
            <p class="thanks">感谢亲友 <span class="bold">干子</span> 对本模拟器的大力支持！</p>
          </div>
          <button class="agree-btn" id="agreeBtn">我已知晓，进入游戏</button>
          <div class="refuse-hint" id="refuseHint">不了，我再想想</div>
        </div>
      `;
      app.innerHTML = html;
      document.getElementById('agreeBtn').addEventListener('click', () => {
        agreed = true;
        currentQuestionIndex = 0;
        renderQuestion();
      });
      document.getElementById('refuseHint').addEventListener('click', () => {
        alert('好吧，等你准备好了随时可以回来。👋');
      });
    }

    function renderQuestion() {
      if (!agreed) {
        renderDisclaimer();
        return;
      }
      if (currentQuestionIndex >= questions.length) {
        renderEnding(determineEnding());
        return;
      }
      const q = questions[currentQuestionIndex];
      const progressText = `${currentQuestionIndex + 1} / ${questions.length}`;
      let optsHtml = '';
      q.options.forEach((opt, idx) => {
        optsHtml += `<button class="option-btn" data-index="${idx}">${opt.text}</button>`;
      });
      const html = `
        <div class="header">
          <div class="title">那鱼RPS CPF</div>
          <div class="subtitle">模拟器</div>
        </div>
        <div class="progress">${progressText}</div>
        <div class="question-text">${q.text}</div>
        <div class="options">${optsHtml}</div>
      `;
      app.innerHTML = html;
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const index = parseInt(this.dataset.index);
          applyOption(q.options[index]);
          currentQuestionIndex++;
          renderQuestion();
        });
      });
    }

    renderQuestion();
  })();
</script>
